<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArcAgent — Agentic Commerce on Arc</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #f5f2eb;
      --card: #fff;
      --border: #e0dbd0;
      --dark: #111008;
      --accent: #d4a017;
      --accent2: #1a3a2a;
      --text: #1a1a0f;
      --muted: #8a846e;
      --success: #1a7a3a;
      --error: #c0392b;
      --tag: #e8e2d4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 40px 20px;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(212,160,23,0.06) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(26,58,42,0.05) 0%, transparent 40%);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
      border-bottom: 2px solid var(--dark);
      padding-bottom: 24px;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1;
      letter-spacing: -2px;
    }

    h1 span {
      color: var(--accent);
    }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 1px;
    }

    .header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .connect-btn {
      background: var(--dark);
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .connect-btn:hover {
      background: var(--accent2);
      transform: translateY(-1px);
    }

    .connect-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .wallet-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--accent2);
      color: #a8f0c0;
      padding: 10px 16px;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 36px; }
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      padding: 24px;
      position: relative;
    }

    .card-full {
      grid-column: 1 / -1;
    }

    .card-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input, .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      padding: 10px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--dark);
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .action-btn:hover {
      background: var(--dark);
      color: var(--accent);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .action-btn.secondary {
      background: var(--accent2);
      color: #fff;
    }

    .action-btn.secondary:hover {
      background: var(--dark);
      color: #4ade80;
    }

    .status {
      display: none;
      padding: 12px;
      font-size: 11px;
      letter-spacing: 0.5px;
      margin-top: 12px;
      word-break: break-all;
      line-height: 1.6;
    }

    .status.success {
      background: rgba(26,122,58,0.08);
      border-left: 3px solid var(--success);
      color: var(--success);
    }

    .status.error {
      background: rgba(192,57,43,0.08);
      border-left: 3px solid var(--error);
      color: var(--error);
    }

    .status.loading {
      background: rgba(212,160,23,0.08);
      border-left: 3px solid var(--accent);
      color: var(--accent);
    }

    .orders-list {
      margin-top: 8px;
    }

    .order-item {
      border: 1.5px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      transition: border-color 0.2s;
    }

    .order-item:hover {
      border-color: var(--accent);
    }

    .order-id {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      min-width: 32px;
    }

    .order-details {
      min-width: 0;
    }

    .order-item-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    .order-status {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      font-weight: 700;
    }

    .order-status.pending {
      background: rgba(212,160,23,0.12);
      color: var(--accent);
      border: 1px solid rgba(212,160,23,0.3);
    }

    .order-status.executed {
      background: rgba(26,122,58,0.1);
      color: var(--success);
      border: 1px solid rgba(26,122,58,0.2);
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
      border: 1.5px dashed var(--border);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: var(--dark);
      padding: 16px;
      text-align: center;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      margin-top: 4px;
    }

    footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <div>
          <div class="eyebrow">Arc Testnet // Agentic Commerce</div>
          <h1>Arc<span>Agent</span></h1>
          <div class="tagline">// autonomous on-chain commerce protocol</div>
        </div>
        <div>
          <div class="wallet-badge" id="walletBadge">
            <div class="dot"></div>
            <span id="walletAddr">Connected</span>
          </div>
          <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        </div>
      </div>
    </header>

    <div class="stats-row" id="statsRow">
      <div class="stat-box">
        <div class="stat-num" id="statOrders">—</div>
        <div class="stat-label">Total Orders</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statPending">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statExecuted">—</div>
        <div class="stat-label">Executed</div>
      </div>
    </div>

    <div class="grid">
      <!-- Place Order -->
      <div class="card">
        <div class="card-label">Place Order</div>
        <div class="field">
          <label>Item Name</label>
          <input type="text" id="itemName" placeholder="e.g. Coffee, API Call..."/>
        </div>
        <div class="field">
          <label>Amount (ART tokens)</label>
          <input type="number" id="orderAmount" placeholder="e.g. 10"/>
        </div>
        <button class="action-btn" id="placeBtn" onclick="placeOrder()">Place Order</button>
        <div class="status" id="placeStatus"></div>
      </div>

      <!-- Execute Order -->
      <div class="card">
        <div class="card-label">Execute Order</div>
        <div class="field">
          <label>Order ID</label>
          <input type="number" id="execOrderId" placeholder="e.g. 1"/>
        </div>
        <div style="height:14px;"></div>
        <div class="field">
          <label>Agent Action</label>
          <input type="text" value="AUTO_EXECUTE_PAYMENT" readonly style="color:var(--muted);font-size:11px;"/>
        </div>
        <button class="action-btn secondary" id="execBtn" onclick="executeOrder()">Execute via Agent</button>
        <div class="status" id="execStatus"></div>
      </div>

      <!-- Order Lookup -->
      <div class="card">
        <div class="card-label">Lookup Order</div>
        <div class="field">
          <label>Order ID</label>
          <input type="number" id="lookupId" placeholder="e.g. 1"/>
        </div>
        <button class="action-btn" style="background:var(--border);color:var(--dark);" onclick="lookupOrder()">Fetch Order</button>
        <div class="status" id="lookupStatus"></div>
      </div>

      <!-- Recent Orders -->
      <div class="card">
        <div class="card-label">Recent Orders</div>
        <div class="orders-list" id="ordersList">
          <div class="empty-state">Connect wallet to view orders</div>
        </div>
      </div>
    </div>

    <footer>
      <span>Contract: <a href="https://testnet.arcscan.app/address/0x708fAe6241305540eC36B27Ce9b45C5e9e518429" target="_blank">0x708f...8429</a></span>
      <span>Built by labiletosky · Arc Testnet</span>
    </footer>
  </div>

  <script>
    const AGENT_ADDR = "0x708fAe6241305540eC36B27Ce9b45C5e9e518429";
    const TOKEN_ADDR = "0x7888Da753f5D964987931741C8ca2044F6c1c463";
    const ARC_CHAIN_ID = "0x4CEB52";

    const AGENT_ABI = [
      "function placeOrder(string memory item, uint256 amount) returns (uint256)",
      "function executeOrder(uint256 orderId)",
      "function getOrder(uint256 orderId) view returns (tuple(uint256 id, address buyer, string item, uint256 amount, bool executed, uint256 timestamp))",
      "function orderCount() view returns (uint256)"
    ];

    const TOKEN_ABI = [
      "function approve(address spender, uint256 amount) returns (bool)",
      "function balanceOf(address) view returns (uint256)"
    ];

    let provider, signer, userAddress;

    async function connectWallet() {
      if (!window.ethereum) return showStatus("placeStatus", "No wallet found.", "error");
      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        try {
          await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: ARC_CHAIN_ID }] });
        } catch(e) {
          if (e.code === 4902) {
            await window.ethereum.request({ method: "wallet_addEthereumChain", params: [{ chainId: ARC_CHAIN_ID, chainName: "Arc Testnet", rpcUrls: ["https://rpc.testnet.arc.network"], nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 }, blockExplorerUrls: ["https://testnet.arcscan.app"] }] });
          }
        }
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();
        document.getElementById("walletBadge").style.display = "flex";
        document.getElementById("walletAddr").textContent = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
        document.getElementById("connectBtn").style.display = "none";
        await loadStats();
        await loadRecentOrders();
      } catch(e) {
        showStatus("placeStatus", "Connection failed: " + e.message, "error");
      }
    }

    async function loadStats() {
      try {
        const agent = new ethers.Contract(AGENT_ADDR, AGENT_ABI, provider);
        const count = await agent.orderCount();
        const total = Number(count);
        let pending = 0, executed = 0;
        for (let i = 1; i <= Math.min(total, 20); i++) {
          const o = await agent.getOrder(i);
          o.executed ? executed++ : pending++;
        }
        document.getElementById("statOrders").textContent = total;
        document.getElementById("statPending").textContent = pending;
        document.getElementById("statExecuted").textContent = executed;
      } catch(e) {}
    }

    async function loadRecentOrders() {
      try {
        const agent = new ethers.Contract(AGENT_ADDR, AGENT_ABI, provider);
        const count = Number(await agent.orderCount());
        const list = document.getElementById("ordersList");
        if (count === 0) { list.innerHTML = '<div class="empty-state">No orders yet. Place one above.</div>'; return; }
        list.innerHTML = "";
        const start = Math.max(1, count - 4);
        for (let i = count; i >= start; i--) {
          const o = await agent.getOrder(i);
          const amt = parseFloat(ethers.formatUnits(o.amount, 18)).toFixed(2);
          list.innerHTML += `
            <div class="order-item">
              <div class="order-id">#${o.id}</div>
              <div class="order-details">
                <div class="order-item-name">${o.item}</div>
                <div class="order-meta">${amt} ART · ${o.buyer.slice(0,6)}...${o.buyer.slice(-4)}</div>
              </div>
              <div class="order-status ${o.executed ? 'executed' : 'pending'}">${o.executed ? 'Done' : 'Pending'}</div>
            </div>`;
        }
      } catch(e) {}
    }

    async function placeOrder() {
      const item = document.getElementById("itemName").value.trim();
      const amt = document.getElementById("orderAmount").value;
      if (!item || !amt) return showStatus("placeStatus", "Fill in all fields.", "error");
      document.getElementById("placeBtn").disabled = true;
      showStatus("placeStatus", "Approving tokens...", "loading");
      try {
        const amount = ethers.parseUnits(amt, 18);
        const token = new ethers.Contract(TOKEN_ADDR, TOKEN_ABI, signer);
        const approveTx = await token.approve(AGENT_ADDR, amount);
        await approveTx.wait();
        showStatus("placeStatus", "Placing order...", "loading");
        const agent = new ethers.Contract(AGENT_ADDR, AGENT_ABI, signer);
        const tx = await agent.placeOrder(item, amount);
        const receipt = await tx.wait();
        showStatus("placeStatus", "✓ Order placed! Tx: " + tx.hash, "success");
        document.getElementById("itemName").value = "";
        document.getElementById("orderAmount").value = "";
        await loadStats();
        await loadRecentOrders();
      } catch(e) {
        showStatus("placeStatus", "Failed: " + (e.reason || e.message), "error");
      }
      document.getElementById("placeBtn").disabled = false;
    }

    async function executeOrder() {
      const id = document.getElementById("execOrderId").value;
      if (!id) return showStatus("execStatus", "Enter an order ID.", "error");
      document.getElementById("execBtn").disabled = true;
      showStatus("execStatus", "Agent executing order...", "loading");
      try {
        const agent = new ethers.Contract(AGENT_ADDR, AGENT_ABI, signer);
        const tx = await agent.executeOrder(Number(id));
        await tx.wait();
        showStatus("execStatus", "✓ Order executed! Tx: " + tx.hash, "success");
        await loadStats();
        await loadRecentOrders();
      } catch(e) {
        showStatus("execStatus", "Failed: " + (e.reason || e.message), "error");
      }
      document.getElementById("execBtn").disabled = false;
    }

    async function lookupOrder() {
      const id = document.getElementById("lookupId").value;
      if (!id) return showStatus("lookupStatus", "Enter an order ID.", "error");
      try {
        const agent = new ethers.Contract(AGENT_ADDR, AGENT_ABI, provider);
        const o = await agent.getOrder(Number(id));
        const amt = parseFloat(ethers.formatUnits(o.amount, 18)).toFixed(4);
        const date = new Date(Number(o.timestamp) * 1000).toLocaleString();
        showStatus("lookupStatus", `ID: #${o.id}\nItem: ${o.item}\nBuyer: ${o.buyer}\nAmount: ${amt} ART\nStatus: ${o.executed ? "✓ Executed" : "⏳ Pending"}\nTime: ${date}`, "success");
      } catch(e) {
        showStatus("lookupStatus", "Order not found.", "error");
      }
    }

    function showStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = "status " + type;
      el.style.display = "block";
    }
  </script>
</body>
</html>
